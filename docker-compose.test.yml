services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.local81
    container_name: gov-test-app
    volumes:
      - .:/var/www/html
    environment:
      CI_ENVIRONMENT: development
      database_default_database: /var/www/html/database/app.db
      database_default_DBDriver: SQLite3
      app_baseURL: http://localhost:8081/
  web:
    image: nginx:alpine
    container_name: gov-test-web
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
