services:
  app:
    image: gov-app-alpine:latest
    container_name: gov-clone-app
    environment:
      CI_ENVIRONMENT: development
      CMS_ADMIN_NAME: BMEB Admin
      CMS_ADMIN_EMAIL: admin@bmeb.local
      CMS_ADMIN_PASSWORD: admin123456
      database.default.database: /var/www/html/database/app.db
      database.default.DBDriver: SQLite3
    volumes:
      - ./writable:/var/www/html/writable
      - ./database:/var/www/html/database
    command: >
      sh -lc "mkdir -p /var/www/html/database
      && touch /var/www/html/database/app.db
      && php spark migrate
      && php spark db:seed NoticeSeeder
      && php spark db:seed App\\\\Database\\\\Seeds\\\\OfficerSeeder
      && php spark db:seed App\\\\Database\\\\Seeds\\\\AdminUserSeeder
      && php spark db:seed App\\\\Database\\\\Seeds\\\\MirrorPageSeeder
      && chown -R www-data:www-data /var/www/html/writable /var/www/html/database
      && php-fpm"
    restart: unless-stopped

  web:
    image: nginx:alpine
    container_name: gov-clone-web
    ports:
      - "80:80"
    volumes:
      - ./public:/var/www/html/public
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
