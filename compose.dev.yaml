services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: gov-dev-app
    environment:
      CI_ENVIRONMENT: development
      app_baseURL: http://localhost:8080/
      database_default_database: /var/www/html/database/app.db
      database_default_DBDriver: SQLite3
      CMS_ADMIN_NAME: BMEB Admin
      CMS_ADMIN_EMAIL: admin@bmeb.local
      CMS_ADMIN_PASSWORD: admin123456
    volumes:
      - ./:/var/www/html
    command: >
      sh -lc "
      mkdir -p /var/www/html/writable/session /var/www/html/writable/cache /var/www/html/writable/logs /var/www/html/database
      && touch /var/www/html/database/app.db
      && if [ ! -f /var/www/html/vendor/autoload.php ]; then composer install --no-interaction --prefer-dist; fi
      && php spark migrate --all
      && php spark db:seed App\\\\Database\\\\Seeds\\\\AdminUserSeeder
      && php spark db:seed App\\\\Database\\\\Seeds\\\\MirrorPageSeeder
      && chown -R www-data:www-data /var/www/html/writable /var/www/html/database
      && php-fpm"
    restart: unless-stopped

  web:
    image: nginx:alpine
    container_name: gov-dev-web
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/html/public
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
